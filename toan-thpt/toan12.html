
<!DOCTYPE html>
<html lang="vi">

    <style>
        /* ==========================================
           CẤU HÌNH CƠ BẢN & LAYOUT CHUẨN NAMINS
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            background-color: #fdfdfd;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow-x: hidden;
        }

        .wrapper-layout {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }

        .subject-title {
            font-size: 24px;
            font-weight: bold;
            color: #1e4620;
            margin-bottom: 15px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1.2;
        }

        .current-lesson-bottom-display {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #1e4620;
            margin-top: 20px;
            margin-bottom: 10px;
            margin-right: 256px;
            width: auto;
            background: transparent;
            transition: all 0.3s ease;
        }

        .search-box {
            float: right;
            margin-bottom: 15px;
        }
        .search-box input {
            width: 200px; 
            padding: 8px 15px; 
            border-radius: 25px;
            border: 1px solid #c7d2d8;
            background: #f1f4f6;
            outline: none;
            font-size: 14px;
            transition: 0.2s;
        }
        .search-box input:focus {
            border-color: #1e4620;
            background: #fff;
        }

        /* ==========================================
           LAYOUT HAI CỘT: VIDEO & MỤC LỤC
           ========================================== */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 256px; 
            width: 100%;
            background-color: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 4px;
            overflow: hidden;
            clear: both;
            transition: all 0.3s ease;
        }

        .video-column {
            background-color: #000;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .video-header {
            background-color: #1e4620; 
            color: #ffffff;
            padding: 5px 15px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 32px; 
        }

        .btn-maximize {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.25);
            width: 24px;
            height: 24px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .btn-maximize:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background-color: #000;
            overflow: hidden;
        }

        .video-wrapper::before {
            content: "";
            display: block;
            padding-top: 56.25%;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background-color: #000;
            display: block;
        }

        .sidebar-column {
            background-color: #ffffff;
            border-left: 1px solid #dcdcdc;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: calc((1100px - 256px) * 9 / 16 + 32px); 
            transition: all 0.3s ease;
        }

        @media (max-width: 1100px) {
            .sidebar-column {
                height: calc((100vw - 296px) * 9 / 16 + 32px);
            }
        }

        .sidebar-header {
            background-color: #ffffff;
            color: #1e4620;
            height: 32px;
            font-size: 13.5px; 
            font-weight: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 3px solid #1e4620;
            flex-shrink: 0;
        }

        .menu-scroll-container {
            flex-grow: 1;
            overflow-y: auto; 
            padding-top: 5px;
        }

        .lesson-row-block {
            border-bottom: 1px dashed #f1f5f9;
        }

        .menu-lesson-header {
            background-color: #ffffff;
            padding: 10px 12px;
            font-size: 13.5px;
            font-weight: 700;
            color: #334155;
            cursor: pointer;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .menu-lesson-header:hover {
            background-color: #f8fafc;
        }

        .menu-lesson-header.has-child::after {
            content: '▾';
            font-size: 10px;
            color: #94a3b8;
            transition: transform 0.2s;
            margin-left: 6px;
            flex-shrink: 0;
        }
        .menu-lesson-header.has-child.collapsed::after {
            transform: rotate(-90deg);
        }

        .lesson-parts-container {
            display: block;
            overflow: hidden;
            background-color: #fafbfc;
        }
        .lesson-parts-container.hidden {
            display: none;
        }

        .menu-item {
            padding: 8px 12px 8px 24px;
            font-size: 12.5px;
            color: #475569;
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.2s;
            border-top: 1px solid #f1f5f9;
        }

        .menu-item:hover {
            background-color: #f1f5f9;
        }

        .lesson-name {
            flex-grow: 1;
            padding-right: 5px;
        }

        .btn-download-icon-only {
            background: transparent !important;
            border: none;
            padding: 2px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: auto; 
            z-index: 10;
            text-decoration: none;
            flex-shrink: 0;
            width: 20px;
            height: 20px;
        }
        .btn-download-icon-only svg {
            width: 100%;
            height: 100%;
            fill: #0076a3;
            transition: transform 0.2s;
        }
        .btn-download-icon-only:hover svg {
            transform: translateY(1px);
            fill: #00567a;
        }

        .menu-item.active, .menu-lesson-header.active-flat {
            background-color: #f0fdf4;
            color: #166534 !important;
            font-weight: 600;
            border-left: 4px solid #1e4620;
        }
        .menu-item.active {
            padding-left: 20px; 
        }

        .main-container.maximized-mode {
            grid-template-columns: 1fr 0px;
        }
        .main-container.maximized-mode .sidebar-column {
            display: none;
        }

        .main-container.maximized-mode + .current-lesson-bottom-display {
            margin-right: 0px;
        }

        .loading-overlay {
            padding: 20px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        /* KHU VỰC QUẢN TRỊ ADMIN */
        #admin-panel { max-width: 1100px; margin: 0 auto 20px auto; padding: 15px; background: #fff3cd; border: 1.5px solid #ffc107; border-radius: 10px; display: none; }
        .admin-form-group { display: flex; flex-direction: column; gap: 10px; }
        .admin-form-group input { width: 100%; padding: 10px 14px; border: 1px solid #ffc107; border-radius: 6px; outline: none; font-size: 14px; background: #fff; }
        .admin-btn-group { display: flex; gap: 15px; align-items: center; }
        .btn-admin { background: #28a745; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .btn-admin:hover { background: #218838; }
        #update-status { font-weight: bold; font-size: 14px; }

        .footer-action {
            margin: 40px 0 15px 0;
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: flex-start;
            gap: 30px;
            width: 100%;
        }

        .btn-register {
            background: linear-gradient(to bottom, #cfa846, #9c7514);
            color: #fff;
            padding: 14px 35px; 
            border-radius: 25px;
            border: 1px solid #85630f;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-transform: uppercase;
        }

        .btn-register:hover { opacity: 0.9; }
        .link-detail { color: #1e4620; font-weight: bold; text-decoration: none; font-size: 16px; text-transform: uppercase; } 
        .link-detail:hover { text-decoration: underline; }
        .copyright { color: #999; font-size: 14px; margin-top: 15px; text-align: left;}

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .video-column {
                padding-bottom: 10px; 
                background-color: #000;
            }
            .sidebar-column {
                border-left: none;
                border-top: 1px solid #dcdcdc;
                height: auto;
                max-height: 320px;
            }
            .current-lesson-bottom-display {
                margin-right: 0px;
                text-align: center;
            }
            .footer-action {
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 15px;
                text-align: center;
            }
            .copyright {
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper-layout">
        
        <div class="search-box">
            <input type="text" id="search-input" oninput="checkAdminAuth(this.value)">
        </div>

        <div class="subject-title">
            <span id="base-subject-text">Môn Học</span>
        </div>

        <div class="main-container" id="main-layout-container">
            <div class="video-column">
                <div class="video-header">
                    <span id="current-lesson-title">Chờ dữ liệu...</span> 
                    <button class="btn-maximize" id="maximize-btn" onclick="toggleMaximizeVideo()" title="Phóng to/Thu nhỏ khung hình">⛶</button>
                </div>
                <div class="video-wrapper" id="wrapper-video-player">
                    <iframe id="video-player" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen=""></iframe>
                </div>
            </div>

            <div class="sidebar-column">
                <div class="sidebar-header" id="sidebar-title"><span>Mục lục bài giảng</span></div>
                <div class="menu-scroll-container" id="menu-container">
                    <div class="loading-overlay">Chờ dữ liệu...</div>
                </div>
            </div>
        </div>

        <div class="current-lesson-bottom-display" id="subject-lesson-append">ONTHI24 EDUCATION</div>

        <div id="admin-panel">
            <div class="admin-form-group">
                <input type="password" id="gh-token-input">
                <div class="admin-btn-group">
                    <button class="btn-admin" id="btn-update-cloud" onclick="startAutoSyncToGitHub()">Cập nhật</button>
                    <span id="update-status" style="color: blue;"></span>
                </div>
            </div>
        </div>

        <div class="footer-action">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSdX0G3eI0fttdhqXR_YAexVfp2LlgFBJTWZUpS4gGjICfkZ_Q/viewform?usp=sharing" target="_blank" style="text-decoration: none;">
                <button class="btn-register">ĐĂNG KÍ HỌC NGAY</button>
            </a>
            <a href="https://onthi24.com" target="_blank" class="link-detail">GIỚI THIỆU VỀ ONTHI24.COM</a>
        </div>
        <div class="copyright">© 2026 ONTHI24</div>
    </div>

    <script>
        const STATIC_DATA_STORE = null; // Dữ liệu sẽ được cập nhật tự động qua GitHub

        function extractYouTubeId(url) {
            if (!url) return '';
            url = url.trim();
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : '';
        }

        function isYouTubeLink(url) {
            if (!url) return false;
            return url.includes('youtube.com') || url.includes('youtu.be');
        }

        function toggleMaximizeVideo() {
            document.getElementById("main-layout-container").classList.toggle("maximized-mode");
        }

        function updateVideoIframe(videoId, isAutoplay) {
            const player = document.getElementById('video-player');
            const autoplayVal = isAutoplay ? 1 : 0;
            const targetSrc = `https://www.youtube.com/embed/${videoId}?autoplay=${autoplayVal}&rel=0&showinfo=0&controls=1&playsinline=1&enablejsapi=1`;
            if (player) player.src = targetSrc;
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (STATIC_DATA_STORE) {
                renderMenuAndVideo(STATIC_DATA_STORE);
            } else {
                document.getElementById('base-subject-text').innerText = "ONTHI24 EDUCATION";
                document.getElementById('menu-container').innerHTML = `<div class="loading-overlay">Chờ dữ liệu... (Admin vui lòng cập nhật)</div>`;
            }
        });

        function renderMenuAndVideo(data) {
            document.getElementById('base-subject-text').innerText = data.subjectTitle;
            document.getElementById('sidebar-title').innerHTML = `<span>${data.sidebarTitle}</span>`;

            const menuContainer = document.getElementById('menu-container');
            menuContainer.innerHTML = '';

            data.lessons.forEach((lesson) => {
                const rowBlock = document.createElement('div');
                rowBlock.className = 'lesson-row-block';
                const headerDiv = document.createElement('div');
                headerDiv.className = 'menu-lesson-header';
                headerDiv.innerText = lesson.lessonTitle;
                if (lesson.colorCode) headerDiv.style.color = lesson.colorCode;

                const partsContainer = document.createElement('div');
                partsContainer.className = 'lesson-parts-container';
                headerDiv.classList.add('has-child', 'collapsed');
                partsContainer.classList.add('hidden');

                headerDiv.addEventListener('click', function() {
                    this.classList.toggle('collapsed');
                    partsContainer.classList.toggle('hidden');
                });

                lesson.parts.forEach((part) => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'menu-item';
                    itemDiv.innerHTML = `<span class="lesson-name">${part.partTitle}</span>`;
                    
                    itemDiv.addEventListener('click', () => {
                        const vid = extractYouTubeId(part.linkUrl);
                        if (vid) updateVideoIframe(vid, true);
                        document.getElementById('current-lesson-title').innerText = part.partTitle;
                    });
                    partsContainer.appendChild(itemDiv);
                });
                rowBlock.appendChild(headerDiv);
                rowBlock.appendChild(partsContainer);
                menuContainer.appendChild(rowBlock);
            });
        }

        function checkAdminAuth(val) {
            if (val.trim() === ADMIN_PASSWORD) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('search-input').value = ''; 
            }
        }

        function startAutoSyncToGitHub() {
            // (Logic đồng bộ GitHub giữ nguyên như cũ)
            alert("Đã sẵn sàng đồng bộ vào repo: " + GH_REPO);
            // Tiếp tục chạy hàm fetch/put như code cũ của bạn
        }
    </script>
</body>
