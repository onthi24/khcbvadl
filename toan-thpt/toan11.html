
<!DOCTYPE html>
<html lang="vi">
<head>
    <base target="_blank">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Giao diện học liệu ONTHI24</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-green: #1a4d2e; --image-orange: #b57318; --primary-orange: #e67e22; --bg-light: #fdfdfd; --border-color: #b5b5b5; --text-dark: #222; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-light); margin: 0; padding: 20px; font-size: 16px; overflow-x: hidden; }
        .top-navbar { display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto 10px auto; width: 100%; background-color: #f1f4f6; padding: 0 10px; border-radius: 4px; }
        .logo-img { height: 45px; }
        .header { display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto 25px auto; width: 100%; }
        .container { display: flex; gap: 20px; max-width: 1100px; margin: 0 auto; width: 100%; }
        .column { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .column-header { padding: 14px 18px; border-radius: 10px; color: white; font-weight: bold; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .bg-green { background: var(--primary-green); }
        .bg-orange { background: var(--image-orange); }
        .item-card { background: #fff; padding: 16px 20px; border-radius: 16px; border: 1.5px solid var(--border-color); cursor: pointer; }
        .dropdown { margin-top: 14px; padding-top: 14px; border-top: 1px dashed #cbd5e1; display: none; }
        .dropdown a { display: block; text-decoration: none; color: #334155; padding: 5px 4px; }
        #admin-panel { max-width: 1100px; margin: 0 auto 20px auto; padding: 15px; background: #fff3cd; border: 1.5px solid #ffc107; display: none; }
    </style>
</head>
<body>

    <div class="top-navbar">
        <img src="https://raw.githubusercontent.com/onthi24/quanlyonthi24/main/Logo%202%20Onthi24%20-2026.png" class="logo-img">
    </div>

    <div class="header">
        <h1><span id="subject-text">Toán</span> <span id="grade-text">11</span></h1>
    </div>

    <div id="admin-panel">
        <input type="password" id="gh-token-input">
        <button onclick="startAutoSyncToGitHub()">Cập nhật</button>
        <span id="update-status"></span>
    </div>

    <div class="container">
        <div class="column" id="column-1"><div class="column-header bg-green">1. Bài giảng</div></div>
        <div class="column" id="column-2"><div class="column-header bg-orange">2. Đề cương & Đề thi</div></div>
    </div>

    <script>
        const SHEET_ID = '1jddm8AKdiiOXVjVF6zMRYiq_5cbzBeRU2X2DD7Wiubg';
        const SHEET_TITLE = 'Sheet1';
        const SHEET_RANGE = 'A1:I150';
        const ADMIN_PASSWORD = 'admin123';
        const GH_OWNER = 'onthi24';
        const GH_REPO = 'quanlyonthi24';

        const STATIC_DATA_STORE = {"meta":{"subject":"Toán","grade":"11","title":"Toán 11"},"columns":{"1":{"Chương 1. Hàm số lượng giác":{"color":"","items":[{"name":"Bài 1. Giá trị lượng giác","link":"#","color":""},{"name":"Bài 2. Công thức lượng giác","link":"#","color":""}]}},"2":{"Đề cương & Đề thi":{"color":"","items":[{"name":"Đề cương 1","link":"#","color":""},{"name":"Bộ đề thi 1","link":"#","color":""}]}}}};

        function toggleMenu(id) {
            let el = document.getElementById(id);
            el.style.display = (el.style.display === "block") ? "none" : "block";
        }

        function renderColumn(colNum, chapters) {
            const col = document.getElementById(`column-${colNum}`);
            for (let chuong in chapters) {
                let id = `c_${colNum}_${chuong}`;
                let card = `<div class="item-card" onclick="toggleMenu('${id}')"><h2>${chuong}</h2><div id="${id}" class="dropdown">`;
                chapters[chuong].items.forEach(i => card += `<a href="${i.link}">${i.name}</a>`);
                card += `</div></div>`;
                col.innerHTML += card;
            }
        }

        window.onload = () => {
            renderColumn(1, STATIC_DATA_STORE.columns[1]);
            renderColumn(2, STATIC_DATA_STORE.columns[2]);
        };

        function checkAdminAuth(val) { if (val === ADMIN_PASSWORD) document.getElementById('admin-panel').style.display = 'block'; }
    </script>
</body>
</html>
