        .header { display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto 25px auto; width: 100%; }
        .logo-text { font-size: 36px; font-weight: 800; text-transform: uppercase; }
        #subject-text { color: var(--primary-green); }
        #grade-text { color: var(--image-orange); margin-left: 5px; }
        .search-box input { width: 270px; padding: 10px 16px; border-radius: 25px; border: 1px solid #c7d2d8; background: #f1f4f6; outline: none; font-size: 15px; }
        .container { display: flex; gap: 20px; max-width: 1100px; margin: 0 auto; width: 100%; }
        .column { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .column-header { padding: 14px 18px; border-radius: 10px; color: white; font-weight: bold; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

    <script>
        const STATIC_DATA_STORE = {"meta":{"subject":"Toán","grade":"12","title":"Toán 12"},"columns":{"1":{},"2":{}}};
        function toggleMenu(id) { let el = document.getElementById(id); el.style.display = (el.style.display === "block") ? "none" : "block"; }
        function renderColumn(colNum, chapters) {
            const col = document.getElementById(`column-${colNum}`);
            for (let c in chapters) {
                let id = `id_${colNum}_${c.replace(/\s/g,'')}`;
                let card = `<div class="item-card" onclick="toggleMenu('${id}')"><h2>${c}</h2><div id="${id}" class="dropdown">`;
                chapters[c].items.forEach(i => card += `<a href="${i.link}">${i.name}</a>`);
                card += `</div></div>`;
                col.innerHTML += card;
            }
        }
        window.onload = () => { renderColumn(1, STATIC_DATA_STORE.columns[1]); renderColumn(2, STATIC_DATA_STORE.columns[2]); };
        function checkAdminAuth(val) { if(val === ADMIN_PASSWORD) document.getElementById('admin-panel').style.display = 'block'; }
