
<!DOCTYPE html>
<html lang="vi">
<head>

    <meta charset="UTF-8">

    <title>Giao diện bài giảng ONTHI24</title>

    <style>
        /* [Giữ nguyên cấu trúc CSS cũ để đảm bảo hiển thị đúng] */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; background-color: #fdfdfd; font-family: 'Segoe UI', Arial, sans-serif; overflow-x: hidden; }
        .wrapper-layout { max-width: 1100px; margin: 0 auto; padding: 20px; width: 100%; }
        
        /* Màu chủ đạo theo thương hiệu ONTHI24 */
        .subject-title { font-size: 24px; font-weight: bold; color: #78281f; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .current-lesson-bottom-display { text-align: center; font-size: 16px; font-weight: bold; color: #78281f; margin-top: 20px; }
        
        .video-header { background-color: #78281f; color: #ffffff; padding: 5px 15px; height: 32px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header { color: #78281f; border-bottom: 3px solid #78281f; }
        .menu-item.active { border-left: 4px solid #78281f; color: #78281f !important; background-color: #fdf2f2; }
        
        .main-container { display: grid; grid-template-columns: 1fr 256px; width: 100%; background-color: #000; border-radius: 4px; overflow: hidden; }
        .video-wrapper { position: relative; width: 100%; background-color: #000; }
        .video-wrapper::before { content: ""; display: block; padding-top: 56.25%; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .btn-register { background: linear-gradient(to bottom, #d4af37, #a67c00); color: #fff; padding: 14px 35px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
        .copyright { color: #999; font-size: 14px; margin-top: 15px; }

        @media (max-width: 768px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="wrapper-layout">
        <div class="search-box">
            <input type="text" id="search-input" oninput="checkAdminAuth(this.value)">
        </div>

        <div class="subject-title">
            <span id="base-subject-text">Môn Học</span>
        </div>

        <div class="main-container" id="main-layout-container">
            <div class="video-column">
                <div class="video-header">
                    <span id="current-lesson-title">Chờ dữ liệu...</span> 
                    <button class="btn-maximize" id="maximize-btn" onclick="toggleMaximizeVideo()">⛶</button>
                </div>
                <div class="video-wrapper" id="wrapper-video-player">
                    <iframe id="video-player" src="" allowfullscreen></iframe>
                </div>
            </div>

            <div class="sidebar-column">
                <div class="sidebar-header" id="sidebar-title"><span>Mục lục bài giảng</span></div>
                <div class="menu-scroll-container" id="menu-container">
                    <div class="loading-overlay">Chờ dữ liệu...</div>
                </div>
            </div>
        </div>

        <div class="current-lesson-bottom-display" id="subject-lesson-append">ONTHI24 EDUCATION</div>

        <div id="admin-panel">
            <div class="admin-form-group">
                <input type="password" id="gh-token-input">
                <button class="btn-admin" onclick="startAutoSyncToGitHub()">Cập nhật</button>
                <span id="update-status"></span>
            </div>
        </div>

        <div class="footer-action">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSdX0G3eI0fttdhqXR_YAexVfp2LlgFBJTWZUpS4gGjICfkZ_Q/viewform?usp=sharing" target="_blank">
                <button class="btn-register">ĐĂNG KÍ HỌC NGAY</button>
            </a>
            <a href="https://sites.google.com/view/onthi24" target="_blank" class="link-detail">GIỚI THIỆU VỀ ONTHI24.COM</a>
        </div>
        <div class="copyright">© 2026 ONTHI24</div>
    </div>

</body>
</html>
