    <script>
        // ==========================================================
        // KHU VỰC BỘ NHỚ ĐỆM ĐÓNG GÓI SẴN (CHỈ CẬP NHẬT KHI ADMIN LỆNH)
        // ==========================================================
        const STATIC_DATA_STORE = {"subjectTitle":"Toán 8","sidebarTitle":"Khoá nền tảng","lessons":[{"lessonTitle":"Chương 1. Vật Lí Nhiệt","colorCode":"#b37d32","parts":[]},{"lessonTitle":"Bài 1. Đại cương vật lí nhiệt","colorCode":"","parts":[{"partTitle":"Phần 2. Tính chất","linkUrl":"https://www.youtube.com/watch?v=OOfiMWzeZig"},{"partTitle":"Phần 3. Ứng dụng","linkUrl":"https://www.youtube.com/watch?v=CblkKDYNg3I&list=PLANVZHOqIcDYKRIOCoBGQ_Z917sTZS25t&index=1"}]},{"lessonTitle":"Bài 2. Khí lí tưởng","colorCode":"","parts":[{"partTitle":"Phần 1. Một số khái niệm về khí lí tưởng","linkUrl":"https://www.youtube.com/watch?v=nAVXKagUUM8&list=PLANVZHOqIcDYKRIOCoBGQ_Z917sTZS25t&index=2"},{"partTitle":"Phần 2. Quá trình đẳng nhiệt","linkUrl":"https://www.youtube.com/watch?v=LTRMbJTgeT8&list=PLANVZHOqIcDYKRIOCoBGQ_Z917sTZS25t&index=3"},{"partTitle":"Phần 3. Quá trình đẳng tích","linkUrl":"https://www.youtube.com/watch?v=6rguojXOCsA&list=PLANVZHOqIcDYKRIOCoBGQ_Z917sTZS25t&index=5"},{"partTitle":"Phần 4. Quá trình đẳng áp","linkUrl":"https://www.youtube.com/watch?v=HlrSYLXQyQQ&list=PLANVZHOqIcDYKRIOCoBGQ_Z917sTZS25t&index=6"}]},{"lessonTitle":"Bài 3. Từ trường","colorCode":"","parts":[{"partTitle":"Phần 1. Một số khái niệm","linkUrl":"https://www.youtube.com/watch?v=Yu2ZnBZffeE&list=PLANVZHOqIcDYKRIOCoBGQ_Z917sTZS25t&index=8"},{"partTitle":"Phần 2. Lực từ","linkUrl":"https://www.youtube.com/watch?v=oBCwKqTRt68&list=PLANVZHOqIcDYKRIOCoBGQ_Z917sTZS25t&index=11"},{"partTitle":"Phần 3. Cảm ứng điện từ","linkUrl":"https://www.youtube.com/watch?v=VwoioQYe1Gk&list=PLANVZHOqIcDYKRIOCoBGQ_Z917sTZS25t&index=15"}]},{"lessonTitle":"Bài 4. Đại cương vật lí nhiệt","colorCode":"","parts":[{"partTitle":"Phần 1. Một số khái niệm","linkUrl":"https://www.youtube.com/watch?v=-0i88XI9ibE"},{"partTitle":"Phần 2. Tính chất","linkUrl":"https://www.youtube.com/watch?v=OOfiMWzeZig"},{"partTitle":"Phần 3. Ứng dụng","linkUrl":"https://www.youtube.com/watch?v=CblkKDYNg3I&list=PLANVZHOqIcDYKRIOCoBGQ_Z917sTZS25t&index=1"}]},{"lessonTitle":"Bài 5. Khí lí tưởng","colorCode":"","parts":[{"partTitle":"Phần 1. Một số khái niệm về khí lí tưởng","linkUrl":"https://www.youtube.com/watch?v=nAVXKagUUM8&list=PLANVZHOqIcDYKRIOCoBGQ_Z917sTZS25t&index=2"},{"partTitle":"Phần 2. Quá trình đẳng nhiệt","linkUrl":"https://www.youtube.com/watch?v=LTRMbJTgeT8&list=PLANVZHOqIcDYKRIOCoBGQ_Z917sTZS25t&index=3"}]},{"lessonTitle":"Bài 6. Khí lí tưởng","colorCode":"","parts":[{"partTitle":"Phần 3. Quá trình đẳng tích","linkUrl":"https://www.youtube.com/watch?v=6rguojXOCsA&list=PLANVZHOqIcDYKRIOCoBGQ_Z917sTZS25t&index=5"},{"partTitle":"Phần 4. Quá trình đẳng áp","linkUrl":"https://www.youtube.com/watch?v=HlrSYLXQyQQ&list=PLANVZHOqIcDYKRIOCoBGQ_Z917sTZS25t&index=6"}]},{"lessonTitle":"Bài 7. Từ trường","colorCode":"","parts":[{"partTitle":"Phần 1. Một số khái niệm","linkUrl":"https://www.youtube.com/watch?v=Yu2ZnBZffeE&list=PLANVZHOqIcDYKRIOCoBGQ_Z917sTZS25t&index=8"},{"partTitle":"Phần 2. Lực từ","linkUrl":"https://www.youtube.com/watch?v=oBCwKqTRt68&list=PLANVZHOqIcDYKRIOCoBGQ_Z917sTZS25t&index=11"}]},{"lessonTitle":"Bài 8. Từ trường","colorCode":"","parts":[{"partTitle":"Phần 3. Cảm ứng điện từ","linkUrl":"https://www.youtube.com/watch?v=VwoioQYe1Gk&list=PLANVZHOqIcDYKRIOCoBGQ_Z917sTZS25t&index=15"}]}]};
        // ==========================================================

        function extractYouTubeId(url) {
            if (!url) return '';
            url = url.trim();
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : '';
        }

        function isYouTubeLink(url) {
            if (!url) return false;
            return url.includes('youtube.com') || url.includes('youtu.be');
        }

        function toggleMaximizeVideo() {
            document.getElementById("main-layout-container").classList.toggle("maximized-mode");
        }

        function updateVideoIframe(videoId, isAutoplay) {
            const player = document.getElementById('video-player');
            const autoplayVal = isAutoplay ? 1 : 0;
            const targetSrc = `https://www.youtube.com/embed/${videoId}?autoplay=${autoplayVal}&rel=0&showinfo=0&controls=1&playsinline=1&enablejsapi=1`;
            if (player) player.src = targetSrc;
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (STATIC_DATA_STORE) {
                renderMenuAndVideo(STATIC_DATA_STORE);
            } else {
                document.getElementById('base-subject-text').innerText = "ONTHI24 EDUCATION";
                document.getElementById('menu-container').innerHTML = `<div class="loading-overlay">Chờ dữ liệu...</div>`;
            }
        });

        function renderMenuAndVideo(data) {
            document.getElementById('base-subject-text').innerText = data.subjectTitle;
            document.getElementById('sidebar-title').innerHTML = `<span>${data.sidebarTitle}</span>`;

            const menuContainer = document.getElementById('menu-container');
            menuContainer.innerHTML = '';

            if (!data.lessons || data.lessons.length === 0) {
                menuContainer.innerHTML = '<div class="loading-overlay">Chưa có bài học nào được thiết lập.</div>';
                return;
            }

            let isFirstVideoLoaded = false;

            data.lessons.forEach((lesson) => {
                const rowBlock = document.createElement('div');
                rowBlock.className = 'lesson-row-block';

                const headerDiv = document.createElement('div');
                headerDiv.className = 'menu-lesson-header';
                
                const titleTextSpan = document.createElement('span');
                titleTextSpan.innerText = lesson.lessonTitle;
                headerDiv.appendChild(titleTextSpan);

                if (lesson.colorCode && lesson.colorCode.trim() !== '' && lesson.colorCode.toLowerCase() !== 'none') {
                    headerDiv.style.color = lesson.colorCode.trim();
                }

                const partsContainer = document.createElement('div');
                partsContainer.className = 'lesson-parts-container';

                if (!lesson.parts || lesson.parts.length === 0) {
                    headerDiv.classList.remove('has-child');
                    rowBlock.appendChild(headerDiv);
                } else {
                    headerDiv.classList.add('has-child', 'collapsed');
                    partsContainer.classList.add('hidden');

                    headerDiv.addEventListener('click', function() {
                        const isCollapsed = this.classList.contains('collapsed');
                        if (isCollapsed) {
                            document.querySelectorAll('.menu-lesson-header.has-child').forEach(h => h.classList.add('collapsed'));
                            document.querySelectorAll('.lesson-parts-container').forEach(c => c.classList.add('hidden'));
                            this.classList.remove('collapsed');
                            partsContainer.classList.remove('hidden');
                        } else {
                            this.classList.add('collapsed');
                            partsContainer.classList.add('hidden');
                        }
                    });

                    lesson.parts.forEach((part) => {
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'menu-item';
                        itemDiv.setAttribute('data-parent-lesson', lesson.lessonTitle);
                        
                        const nameSpan = document.createElement('span');
                        nameSpan.className = 'lesson-name';
                        nameSpan.innerText = part.partTitle;
                        itemDiv.appendChild(nameSpan);

                        if (isYouTubeLink(part.linkUrl)) {
                            const videoId = extractYouTubeId(part.linkUrl);
                            
                            itemDiv.addEventListener('click', function(e) {
                                if(e.target.closest('a')) return; 
                                document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
                                document.querySelectorAll('.menu-lesson-header').forEach(h => h.classList.remove('active-flat'));
                                itemDiv.classList.add('active');

                                updateVideoIframe(videoId, true);
                                document.getElementById('current-lesson-title').innerText = part.partTitle;
                                document.getElementById('subject-lesson-append').innerText = this.getAttribute('data-parent-lesson');
                            });

                            if (!isFirstVideoLoaded && videoId) {
                                headerDiv.classList.remove('collapsed');
                                partsContainer.classList.remove('hidden');
                                itemDiv.classList.add('active');

                                updateVideoIframe(videoId, false);
                                document.getElementById('current-lesson-title').innerText = part.partTitle;
                                document.getElementById('subject-lesson-append').innerText = itemDiv.getAttribute('data-parent-lesson');
                                isFirstVideoLoaded = true;
                            }
                        } else {
                            if (part.linkUrl && part.linkUrl.trim() !== '') {
                                const dlBtn = document.createElement('a');
                                dlBtn.className = 'btn-download-icon-only';
                                dlBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>`;
                                dlBtn.href = part.linkUrl;
                                dlBtn.target = '_blank';
                                dlBtn.addEventListener('click', (e) => e.stopPropagation());
                                itemDiv.appendChild(dlBtn);
                            }

                            itemDiv.addEventListener('click', function(e) {
                                if(e.target.closest('a')) return;
                                document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
                                document.querySelectorAll('.menu-lesson-header').forEach(h => h.classList.remove('active-flat'));
                                itemDiv.classList.add('active');
                                document.getElementById('current-lesson-title').innerText = part.partTitle;
                                document.getElementById('subject-lesson-append').innerText = this.getAttribute('data-parent-lesson');
                            });
                        }
                        partsContainer.appendChild(itemDiv);
                    });

                    rowBlock.appendChild(headerDiv);
                    rowBlock.appendChild(partsContainer);
                }
                menuContainer.appendChild(rowBlock);
            });

            if (!isFirstVideoLoaded && data.lessons.length > 0) {
                document.getElementById('subject-lesson-append').innerText = data.lessons[0].lessonTitle;
                document.getElementById('current-lesson-title').innerText = "Chọn bài học ở mục lục";
            }
        }

        function checkAdminAuth(val) {
            if (val.trim() === ADMIN_PASSWORD) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('search-input').value = ''; 
                document.getElementById('admin-panel').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function parseGoogleSheetToPackage(rawText) {
            const data = JSON.parse(rawText.substr(47).slice(0, -2));
            const rows = data.table.rows;
            const rawCols = data.table.cols; 
            
            let subjectVal = 'Toán 6', sidebarVal = 'Khóa bồi dưỡng kiến thức', targetPath = 'video/video-toan-6.html';
            
            function getVal(cols, index) {
                if (!cols || index >= cols.length || !cols[index] || cols[index].v === null || cols[index].v === undefined) return '';
                return cols[index].v.toString().trim();
            }

            if (rawCols && rawCols.length >= 8) {
                if (rawCols[7] && rawCols[7].label) {
                    targetPath = rawCols[7].label.toString().trim();
                }
            }

            if (rows[0] && rows[0].c) {
                subjectVal = getVal(rows[0].c, 0) || 'Toán 6';    
                sidebarVal = getVal(rows[0].c, 1) || 'Khóa bồi dưỡng kiến thức'; 
            }
            
            let structuredData = {
                subjectTitle: subjectVal,
                sidebarTitle: sidebarVal,
                lessons: []
            };

            let currentLessonObj = null;

            for (let i = 0; i < rows.length; i++) {
                const cols = rows[i].c;
                if (!cols) continue;

                const checkSidebarCol = getVal(cols, 1); 
                if (!checkSidebarCol) break; 

                const lessonTitle = getVal(cols, 2); 
                const partTitle   = getVal(cols, 3); 
                const linkUrl     = getVal(cols, 4); 
                const colorCode   = getVal(cols, 5); 

                if (!lessonTitle) continue;

                if (!currentLessonObj || currentLessonObj.lessonTitle !== lessonTitle) {
                    currentLessonObj = {
                        lessonTitle: lessonTitle,
                        colorCode: colorCode,
                        parts: []
                    };
                    structuredData.lessons.push(currentLessonObj);
                }

                if (partTitle && partTitle.trim() !== '') {
                    currentLessonObj.parts.push({
                        partTitle: partTitle,
                        linkUrl: linkUrl
                    });
                }
            }
            
            return { data: structuredData, gitPath: targetPath };
        }

        function startAutoSyncToGitHub() {
            const token = document.getElementById('gh-token-input').value.trim();
            const status = document.getElementById('update-status');
            
            if(!token) return;
            
            status.innerText = "⏳";
            status.style.color = "orange";

            const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_TITLE)}&range=${SHEET_RANGE}`;

            fetch(SHEET_URL)
            .then(res => { if(!res.ok) throw new Error("Lỗi kết nối Sheet!"); return res.text(); })
            .then(rep => {
                const parsedResult = parseGoogleSheetToPackage(rep);
                const ghPathFromSheet = parsedResult.gitPath; 
                
                const githubApiUrl = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${ghPathFromSheet}`;
                
                return fetch(githubApiUrl, {
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                })
                .then(res => {
                    if (res.status === 401) throw new Error("Mã Token sai hoặc hết hạn!");
                    if (!res.ok) throw new Error(`Không tìm thấy file [${ghPathFromSheet}] trên GitHub!`);
                    return res.json();
                })
                .then(fileData => {
                    const fileSha = fileData.sha; 
                    const oldSourceBase64 = fileData.content;
                    let oldHtmlText = decodeURIComponent(escape(atob(oldSourceBase64.replace(/\s/g, ''))));
                    
                    const jsonStringData = JSON.stringify(parsedResult.data);
                    const regexReplace = /const STATIC_DATA_STORE = \{.*?\};|const STATIC_DATA_STORE = null;/;
                    let newHtmlText = oldHtmlText.replace(regexReplace, `const STATIC_DATA_STORE = ${jsonStringData};`);
                    
                    const newContentBase64 = btoa(unescape(encodeURIComponent(newHtmlText)));
                    
                    return fetch(githubApiUrl, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json',
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify({
                            message: `⚡ Auto-Sync: ${ghPathFromSheet}`,
                            content: newContentBase64,
                            sha: fileSha
                        })
                    });
                });
            })
            .then(res => {
                if(!res.ok) throw new Error("Đồng bộ GitHub thất bại!");
                return res.json();
            })
            .then(() => {
                status.innerText = "✅ THÀNH CÔNG!";
                status.style.color = "green";
                document.getElementById('gh-token-input').value = ""; 
                
                setTimeout(() => {
                    location.reload(); 
                }, 1000);
            })
            .catch(err => {
                console.error(err);
                status.innerText = "❌ Lỗi: " + err.message;
                status.style.color = "red";
            });
        }
    </script>
