        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; background-color: #fdfdfd; font-family: 'Segoe UI', Arial, sans-serif; overflow-x: hidden; }

        .main-container { display: grid; grid-template-columns: 1fr 256px; width: 100%; background-color: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 4px; overflow: hidden; clear: both; transition: all 0.3s ease; }

        .video-wrapper { position: relative; width: 100%; background-color: #000; overflow: hidden; }

        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .sidebar-column { background-color: #ffffff; border-left: 1px solid #dcdcdc; display: flex; flex-direction: column; width: 100%; height: calc((1100px - 256px) * 9 / 16 + 32px); transition: all 0.3s ease; }
        .sidebar-header { background-color: #ffffff; color: #1e4620; height: 32px; font-size: 13.5px; font-weight: 800; display: flex; justify-content: center; align-items: center; border-bottom: 3px solid #1e4620; flex-shrink: 0; }
