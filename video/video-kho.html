
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONTHI24 - Kho Video Học Tập</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #1abc9c;
            --primary-blue: #3498db;
            --primary-orange: #e67e22;
            --thcs-green: #1a4d2e;
            --thpt-blue: #78281f;
            --vatli-orange: #B5782A;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #fdfdfd; 
            margin: 0;
            padding: 20px;
            font-size: 16px;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        .top-navbar {
            max-width: 1100px;
            margin: 0 auto 10px auto;
            width: 100%;
            background-color: #f1f4f6;
            padding: 10px 15px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-img { height: 45px; object-fit: contain; }
        .mobile-menu-btn { display: none; font-size: 24px; cursor: pointer; }

        .nav-menu { display: flex; list-style: none; gap: 5px; margin: 0; }
        .nav-item { text-decoration: none; color: #333; padding: 14px 15px; font-weight: 500; border-bottom: 4px solid transparent; }
        .nav-item.active { font-weight: bold; background-color: #fff; border-bottom: 4px solid #000; }
        .nav-item:hover { background-color: #e2e8f0; }

        /* --- HEADER --- */
        .header-main { display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto 25px auto; }
        .main-title { font-size: 38px; font-weight: 800; margin: 0; }
        .text-kho { color: var(--thcs-green); }
        .text-video { color: var(--thpt-blue); margin-left: 6px; }

        /* --- CONTAINER --- */
        .container { display: flex; gap: 20px; max-width: 1100px; margin: 0 auto; width: 100%; }
        .column { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .column-header { padding: 14px 18px; border-radius: 10px; color: white; font-weight: bold; font-size: 20px; }
        .bg-green { background: var(--thcs-green); }
        .bg-blue { background: var(--thpt-blue); }
        .bg-orange { background: var(--vatli-orange); }

        .item-card { background: #fff; padding: 14px 18px; border-radius: 16px; border: 1.5px solid #b5b5b5; text-decoration: none; display: block; transition: 0.2s; }
        .item-card:hover { background-color: #f8fafc; border-color: var(--thpt-blue); }
        .item-card h2 { margin: 0; font-weight: 700; color: #222; font-size: 18px; }

        /* --- FOOTER --- */
        .footer-action { margin: 40px auto 20px auto; max-width: 1100px; text-align: center; }
        .btn-register { background: linear-gradient(to bottom, #d4af37, #a67c00); color: #fff; padding: 14px 35px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
        .copyright { color: #999; text-align: center; margin-top: 20px; }

        @media (max-width: 768px) {
            .mobile-menu-btn { display: block; }
            .nav-menu { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: #f4f6f8; z-index: 999; flex-direction: column; padding-top: 60px; transition: 0.3s; }
            .nav-menu.open { left: 0; }
            .container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="top-navbar">
        <div class="mobile-menu-btn" onclick="document.getElementById('mobileNavMenu').classList.add('open')"><i class="fa fa-bars"></i></div>
        <img src="https://raw.githubusercontent.com/onthi24/quanlyonthi24/main/Logo%202%20Onthi24%20-2026.png" alt="ONTHI24" class="logo-img">
        
        <div class="nav-menu" id="mobileNavMenu">
            <div style="padding: 20px; cursor: pointer;" onclick="document.getElementById('mobileNavMenu').classList.remove('open')"><i class="fa fa-times"></i></div>
            <a href="/" class="nav-item">Trang chủ</a>
            <a href="/video/video-kho.html" class="nav-item active">Video</a>
        </div>
    </div>

    <div class="header-main">
        <h1 class="main-title"><span class="text-kho">Kho</span><span class="text-video">Video</span></h1>
    </div>

    <div class="container">
        <div class="column">
            <div class="column-header bg-green">1. Toán THCS</div>
            <a class="item-card" href="/video/video-toan-9.html"><h2>Video Toán 9</h2></a>
            <a class="item-card" href="/video/video-toan-8.html"><h2>Video Toán 8</h2></a>
            <a class="item-card" href="/video/video-toan-7.html"><h2>Video Toán 7</h2></a>
            <a class="item-card" href="/video/video-toan-6.html"><h2>Video Toán 6</h2></a>
        </div>
        <div class="column">
            <div class="column-header bg-blue">2. Toán THPT</div>
            <a class="item-card" href="/video/video-toan-12.html"><h2>Video Toán 12</h2></a>
            <a class="item-card" href="/video/video-toan-11.html"><h2>Video Toán 11</h2></a>
            <a class="item-card" href="/video/video-toan-10.html"><h2>Video Toán 10</h2></a>
        </div>
        <div class="column">
            <div class="column-header bg-orange">3. Vật Lí & KHTN</div>
            <a class="item-card" href="/video/video-vatli-12.html"><h2>Video Vật Lí 12</h2></a>
            <a class="item-card" href="/video/video-vatli-11.html"><h2>Video Vật Lí 11</h2></a>
            <a class="item-card" href="/video/video-vatli-10.html"><h2>Video Vật Lí 10</h2></a>
        </div>
    </div>

    <div class="footer-action">
        <button class="btn-register">ĐĂNG KÍ HỌC NGAY</button>
        <p style="margin-top: 20px;">GIỚI THIỆU VỀ ONTHI24.COM</p>
    </div>

    <div class="copyright">© 2026 ONTHI24</div>

</body>
</html>
