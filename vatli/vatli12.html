        const STATIC_DATA_STORE = {"meta":{"subject":"Vật Lí","grade":"12","title":"Vật Lí 12"},"columns":{"1":{"Chương 1. Vật lí nhiệt":{"color":"","items":[{"name":"Bài 1. Cấu trúc của chất. Sự chuyển thể.","link":"#","color":""},{"name":"Bài 2. Nội năng. Định luật I của nhiệt động lực học.","link":"#","color":""},{"name":"Bài 3. Nhiệt độ. Thang nhiệt độ – nhiệt kế.","link":"#","color":""},{"name":"Bài 4. Nhiệt dung riêng.","link":"#","color":""},{"name":"Bài 5. Nhiệt nóng chảy riêng.","link":"#","color":""},{"name":"Bài 6. Nhiệt hóa hơi riêng.","link":"#","color":""},{"name":"Bài 7. Bài tập về vật lí nhiệt.","link":"#","color":""}]},"Chương 2. Khí lí tưởng":{"color":"","items":[{"name":"Bài 8. Phan tích động học phân tử chất khí.","link":"#","color":""},{"name":"Bài 9. Định luật Boyle.","link":"#","color":""},{"name":"Bài 10. Định luật Charles.","link":"#","color":""},{"name":"Bài 11. Phương trình trạng thái của khí lí tưởng.","link":"#","color":""},{"name":"Bài 12. Áp suất khí theo mô hình động học phân tử. Quan hệ giữa động năng phần tử và nhiệt độ.","link":"#","color":""},{"name":"Bài 13. Bài tập về khí lí tưởng.","link":"#","color":""}]},"Chương 3. Từ trường":{"color":"","items":[{"name":"Bài 14. Từ trường.","link":"#","color":""},{"name":"Bài 15. Lực tử tác dụng lên dây dẫn mang dòng điện. Cảm ứng từ.","link":"#","color":""},{"name":"Bài 16. Từ thông. Hiện tượng cảm ứng điện từ.","link":"#","color":""},{"name":"Bài 17. Máy phát điện xoay chiều.","link":"#","color":""}]},"Chương 4. Vật lí hạt nhân":{"color":"","items":[{"name":"Bài 18. Ứng dụng hiện tượng cảm ứng điện từ.","link":"#","color":""},{"name":"Bài 19. Điện từ trường. Mô hình sóng điện từ.","link":"#","color":""},{"name":"Bài 20. Bài tập về tử trường.","link":"#","color":""},{"name":"Bài 21. Cấu trúc hạt nhân.","link":"#","color":""},{"name":"Bài 22. Phản ứng hạt nhần và năng lượng liên kết.","link":"#","color":""},{"name":"Bài 23. Hiện tượng phóng xạ.","link":"#","color":""},{"name":"Bài 24. Công nghiệp hạt nhân.","link":"#","color":""},{"name":"Bải 25. Bài tập về vật lí hạt nhân.","link":"#","color":""}]}},"2":{"1.1 Đề cương giữa kì 1":{"color":"","items":[{"name":"Đề cương 1","link":"https://www.youtube.com/watch?v=wyLaay_sHtk&list=RDwyLaay_sHtk&start_radio=1","color":""},{"name":"Đề cương 2","link":"#","color":""},{"name":"Đề cương 3","link":"#","color":""},{"name":"Đề cương 4","link":"#","color":""}]},"1.2 Đề thi giữ kì 1":{"color":"","items":[{"name":"Bộ đề thi 1","link":"#","color":""},{"name":"Bộ đề thi 2","link":"#","color":""}]},"1.3 Đề cương học kì 1":{"color":"","items":[{"name":"Đề cương 1","link":"#","color":""},{"name":"Đề cương 2","link":"#","color":""},{"name":"Đề cương 3","link":"#","color":""},{"name":"Đề cương 4","link":"#","color":""}]},"1.4 Đề thi học kì 1":{"color":"","items":[{"name":"Bộ đề thi 1","link":"#","color":""},{"name":"Bộ đề thi 2","link":"#","color":""}]}}}};
        // ==========================================================

        function openMobileMenu(e) { e.stopPropagation(); document.getElementById('mobileNavMenu').classList.add('open'); }
        function closeMobileMenu(e) { e.stopPropagation(); document.getElementById('mobileNavMenu').classList.remove('open'); }
        function handleMobileClick(wrapper, event) { if (window.innerWidth <= 768) { if (event.target.tagName === 'A' && event.target.getAttribute('href') !== '#') return; event.preventDefault(); event.stopPropagation(); wrapper.classList.toggle('active-mobile'); } }

        function toggleMenu(id) {
            let targetMenu = document.getElementById(id);
            if (targetMenu) {
                const currentDisplay = window.getComputedStyle(targetMenu).display;
                document.querySelectorAll('.container .dropdown').forEach(menu => { menu.style.display = 'none'; });
                if (currentDisplay === "none") { targetMenu.style.display = "block"; }
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Khởi tạo trạng thái thanh navbar
            const currentUrl = window.location.href;
            document.querySelectorAll('.nav-menu .nav-item').forEach(el => el.classList.remove('active'));
            if (currentUrl.includes('/toan-thpt/')) document.getElementById('menu-thpt').classList.add('active');
            else if (currentUrl.includes('/toan-thcs/')) document.getElementById('menu-thcs').classList.add('active');
            else if (currentUrl.includes('/vatli/')) document.getElementById('menu-vatli').classList.add('active');
            else if (currentUrl.includes('/video/')) document.getElementById('menu-video').classList.add('active');
            else document.getElementById('menu-home').classList.add('active');

            // Render giao diện HOÀN TOÀN TỪ FILE TĨNH (Học sinh tuyệt đối không gọi API Sheet)
            if (STATIC_DATA_STORE) {
                document.getElementById('subject-text').innerText = STATIC_DATA_STORE.meta.subject || "Toán";
                document.getElementById('grade-text').innerText = STATIC_DATA_STORE.meta.grade || "10";
                document.getElementById('page-title').innerText = STATIC_DATA_STORE.meta.title || "ONTHI24 Education";
                
                renderColumn(1, STATIC_DATA_STORE.columns[1]);
                renderColumn(2, STATIC_DATA_STORE.columns[2]);
            } else {
                // File mới tinh chưa từng được Admin đồng bộ đóng gói
                document.getElementById('column-1').innerHTML = `<div class="column-header bg-green">1. Bài giảng</div><div class="loading-overlay" style="color:orange; font-weight:bold;">🛠️ TRANG MỚI: Vui lòng gõ mật khẩu Quản trị vào ô Tìm kiếm để Đồng bộ dữ liệu lên GitHub!</div>`;
                document.getElementById('column-2').innerHTML = `<div class="column-header bg-orange">2. Đề cương &amp; Đề thi</div><div class="loading-overlay">Chờ dữ liệu...</div>`;
            }

            document.addEventListener('click', (e) => {
                if(window.innerWidth <= 768) {
                    const menu = document.getElementById('mobileNavMenu');
                    if(menu && !menu.contains(e.target)) menu.classList.remove('open');
                }
            });
        });

        function renderColumn(colNum, chapters) {
            const columnEl = document.getElementById(`column-${colNum}`);
            if (!columnEl) return;
            const headerEl = columnEl.querySelector('.column-header');
            columnEl.innerHTML = headerEl ? headerEl.outerHTML : '';

            let index = 0;
            for (let chuongName in chapters) {
                index++;
                const menuId = `chuong_col${colNum}_${index}`;
                const chapterData = chapters[chuongName];
                
                const card = document.createElement('div');
                card.className = 'item-card';
                card.style.marginBottom = '12px';
                card.setAttribute('onclick', `toggleMenu('${menuId}')`);

                const h2 = document.createElement('h2');
                h2.innerText = chuongName;
                if (chapterData.color) h2.style.color = chapterData.color; 
                card.appendChild(h2);

                const dropdown = document.createElement('div');
                dropdown.className = 'dropdown';
                dropdown.id = menuId;

                if (!chapterData.items || chapterData.items.length === 0) {
                    dropdown.innerHTML = '<span style="color:#888; font-style:italic; font-size:14px; padding: 5px 4px; display:block;">(Chưa có học liệu con)</span>';
                } else {
                    chapterData.items.forEach(item => {
                        const a = document.createElement('a');
                        a.href = item.link; a.target = '_blank';
                        a.onclick = (e) => e.stopPropagation(); 
                        if (item.color) a.style.color = item.color; 
                        const span = document.createElement('span');
                        span.innerText = item.name;
                        a.appendChild(span);
                        dropdown.appendChild(a);
                    });
                }
                card.appendChild(dropdown);
                columnEl.appendChild(card);
            }
            if (!chapters || Object.keys(chapters).length === 0) {
                const emptyNotify = document.createElement('div');
                emptyNotify.className = 'loading-overlay';
                emptyNotify.innerText = 'Hiện tại mục này chưa cập nhật nội dung.';
                columnEl.appendChild(emptyNotify);
            }
        }

        function checkAdminAuth(val) {
            if (val.trim() === ADMIN_PASSWORD) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('search-input').value = ''; 
                document.getElementById('admin-panel').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function parseGoogleSheetToPackage(rawText) {
            const data = JSON.parse(rawText.substr(47).slice(0, -2));
            const rows = data.table.rows;
            
            let subjectVal = 'Toán', gradeVal = '10', titleVal = 'Toán 10', targetPath = 'toan-thpt/toan10.html';
            
            if (rows[0] && rows[0].c) {
                if (rows[0].c[5] && rows[0].c[5].v) subjectVal = rows[0].c[5].v.toString().trim(); 
                if (rows[0].c[6] && rows[0].c[6].v) gradeVal = rows[0].c[6].v.toString().trim();    
                if (rows[0].c[7] && rows[0].c[7].v) titleVal = rows[0].c[7].v.toString().trim();    
                if (rows[0].c[8] && rows[0].c[8].v) targetPath = rows[0].c[8].v.toString().trim();  
            }
            
            let columnsData = { 1: {}, 2: {} };
            rows.forEach((row, rowIndex) => {
                if (!row.c) return;
                if (rowIndex === 0 && !row.c[0]) return;
                const colNum = (row.c[0] && row.c[0].v) ? parseInt(row.c[0].v) : 1;
                const chuongName = (row.c[1] && row.c[1].v) ? row.c[1].v.toString().trim() : '';
                const baiName = (row.c[2] && row.c[2].v) ? row.c[2].v.toString().trim() : '';
                const linkUrl = (row.c[3] && row.c[3].v) ? row.c[3].v.toString().trim() : '#';
                const customColor = (row.c[4] && row.c[4].v) ? row.c[4].v.toString().trim() : '';
                if (chuongName) {
                    if (!columnsData[colNum]) columnsData[colNum] = {};
                    if (!columnsData[colNum][chuongName]) {
                        columnsData[colNum][chuongName] = { color: '', items: [] };
                    }
                    if (baiName) columnsData[colNum][chuongName].items.push({ name: baiName, link: linkUrl, color: customColor });
                    else if (customColor) columnsData[colNum][chuongName].color = customColor;
                }
            });
            
            return { 
                meta: { subject: subjectVal, grade: gradeVal, title: titleVal }, 
                columns: columnsData,
                gitPath: targetPath 
            };
        }

        function startAutoSyncToGitHub() {
            const token = document.getElementById('gh-token-input').value.trim();
            const status = document.getElementById('update-status');
            
            if(!token) { return; }
            
            status.innerText = "⏳ Đang kết nối Sheet...";
            status.style.color = "orange";

            const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_TITLE)}&range=${SHEET_RANGE}`;

            fetch(SHEET_URL)
            .then(res => { if(!res.ok) throw new Error("Lỗi kết nối Sheet!"); return res.text(); })
            .then(rep => {
                const freshPackage = parseGoogleSheetToPackage(rep);
                const ghPathFromSheet = freshPackage.gitPath; 
                
                status.innerText = "⏳ Đang kết nối GitHub...";
                const githubApiUrl = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${ghPathFromSheet}`;
                
                return fetch(githubApiUrl, {
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                })
                .then(res => {
                    if (res.status === 401) throw new Error("Mã Token sai hoặc hết hạn!");
                    if (!res.ok) throw new Error(`Không tìm thấy file [${ghPathFromSheet}] trên GitHub!`);
                    return res.json();
                })
                .then(fileData => {
                    status.innerText = "⏳ Đang đóng gói dữ liệu...";
                    
                    const fileSha = fileData.sha; 
                    const oldSourceBase64 = fileData.content;
                    let oldHtmlText = decodeURIComponent(escape(atob(oldSourceBase64.replace(/\s/g, ''))));
                    
                    const cleanSaveData = { meta: freshPackage.meta, columns: freshPackage.columns };
                    const jsonStringData = JSON.stringify(cleanSaveData);
                    
                    const regexReplace = /const STATIC_DATA_STORE = \{.*?\};|const STATIC_DATA_STORE = null;/;
                    let newHtmlText = oldHtmlText.replace(regexReplace, `const STATIC_DATA_STORE = ${jsonStringData};`);
                    
                    const newContentBase64 = btoa(unescape(encodeURIComponent(newHtmlText)));
                    
                    status.innerText = "⏳ Đang đồng bộ file...";
                    
                    return fetch(githubApiUrl, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json',
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify({
                            message: `⚡ Auto-Sync: ${ghPathFromSheet}`,
                            content: newContentBase64,
                            sha: fileSha
                        })
                    });
                });
            })
            .then(res => {
                if(!res.ok) throw new Error("Đồng bộ GitHub thất bại!");
                return res.json();
            })
            .then(() => {
                status.innerText = "✅ THÀNH CÔNG!";
                status.style.color = "green";
                document.getElementById('gh-token-input').value = ""; // Tiêu hủy Token ngay lập tức
                
                // Tự động làm mới trang sau 1 giây để nạp lại giao diện tĩnh mới
                setTimeout(() => {
                    location.reload(); 
                }, 1000);
            })
            .catch(err => {
                console.error(err);
                status.innerText = "❌ Lỗi: " + err.message;
                status.style.color = "red";
            });
        }
    </script>
